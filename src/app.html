<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width"
    />

    <link
      rel="icon"
      href="%sveltekit.assets%/favicon.png"
    />
    <link
      rel="apple-touch-icon"
      href="%sveltekit.assets%/favicon.png"
    />
    <link
      rel="manifest"
      href="%sveltekit.assets%/site.webmanifest"
    />

    <!-- TODO: keep this in sync with APP.NAME in src/lib/const/app.const.ts -->
    <meta
      name="apple-mobile-web-app-title"
      content="App Starter"
    />

    <meta
      name="apple-mobile-web-app-capable"
      content="yes"
    />
    <meta
      name="mobile-web-app-capable"
      content="yes"
    />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
    />

    <!-- TODO: keep this in sync with theme_color in static/site.webmanifest -->
    <meta
      name="theme-color"
      content="#000000"
    />

    %sveltekit.head%
  </head>

  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
